<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThreatGuard Pro - AI Cybersecurity Scanner</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* YOUR ORIGINAL CSS (UNCHANGED) */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0c0c0c 0%,#1a1a2e 50%,#16213e 100%);color:#fff;min-height:100vh;}
.container{max-width:1200px;margin:auto;padding:20px;}
.header{text-align:center;margin-bottom:50px;}
.logo{font-size:3rem;font-weight:700;background:linear-gradient(45deg,#00d4ff,#ff00ff,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{color:#aaa;}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(500px,1fr));gap:30px;}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:24px;
padding:40px;
transition:0.4s;
}

.card:hover{transform:translateY(-10px);}

.btn{
width:100%;
padding:18px;
background:linear-gradient(135deg,#00d4ff,#0099cc);
border:none;
border-radius:16px;
font-size:1.1rem;
color:#fff;
cursor:pointer;
}

.form-input{
width:100%;
padding:18px;
border-radius:16px;
background:#111;
color:#fff;
border:1px solid #333;
}

.file-input-wrapper input{display:none;}

.file-input-label{
display:block;
padding:18px;
border:2px dashed rgba(255,107,107,0.5);
border-radius:16px;
text-align:center;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
border-radius:16px;
text-align:center;
font-size:1.2rem;
}

.safe{color:#4caf50;}
.phishing{color:#9c27b0;}
.malware{color:#f44336;}
.defacement{color:#ff9800;}

.loading{display:none;text-align:center;margin-top:30px;}
.spinner{
border:4px solid rgba(255,255,255,0.1);
border-left:4px solid #00d4ff;
height:40px;width:40px;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}
@keyframes spin{100%{transform:rotate(360deg);}}
</style>

<script>
function showLoading(){
    document.getElementById("loadingBar").style.display="block";
}

function updateFileName(input){
    const label = document.getElementById("fileLabel");
    if(input.files.length > 0){
        label.innerHTML = "📄 " + input.files[0].name;
    }
}
</script>

</head>

<body>

<div class="container">

<div class="header">
    <div class="logo">
        <i class="fas fa-shield-alt"></i> ThreatGuard Pro
    </div>
    <div class="subtitle">AI-Powered Cybersecurity Scanner</div>
</div>

<div class="cards-grid">

<!-- FILE -->
<div class="card">
<h3><i class="fas fa-upload"></i> File Scam Detector</h3>

<form action="/scam/" method="post" enctype="multipart/form-data" onsubmit="showLoading()">

<div class="file-input-wrapper">
<input type="file" name="file" id="fileInput" accept=".pdf,.txt" required onchange="updateFileName(this)">
<label for="fileInput" class="file-input-label" id="fileLabel">
<i class="fas fa-cloud-upload-alt"></i> Choose file...
</label>
</div>

<br>
<button type="submit" class="btn">Analyze File</button>
</form>

{% if message %}
<div class="result 
{% if 'Scam' in message %}phishing
{% elif 'Suspicious' in message %}defacement
{% else %}safe{% endif %}">
{{ message }}
</div>
{% endif %}
</div>

<!-- URL -->
<div class="card">
<h3><i class="fas fa-link"></i> URL Scanner</h3>

<form method="post" action="/predict" onsubmit="showLoading()">
<input type="url" name="url" class="form-input" required>
<br><br>
<button type="submit" class="btn">Scan URL</button>
</form>

{% if predicted_class %}
<div class="result 
{% if 'phishing' in predicted_class %}phishing
{% elif 'malware' in predicted_class %}malware
{% else %}safe{% endif %}">
<p>{{ input_url }}</p>
<p><strong>{{ predicted_class }}</strong></p>
</div>
{% endif %}
</div>

</div>

<!-- LOADING -->
<div class="loading" id="loadingBar">
<div class="spinner"></div>
<p>Scanning...</p>
</div>

<!-- DOWNLOAD -->
{% if message or predicted_class %}
<div style="text-align:center;margin-top:30px;">
<a href="/download_report?result={{ message or predicted_class }}">
<button class="btn">⬇ Download Report</button>
</a>
</div>
{% endif %}

</div>

</body>
</html>
